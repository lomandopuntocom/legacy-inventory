name: CI Pipeline - Legacy Inventory

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar pruebas automáticas
        run: npm run test

      - name: Empaquetar aplicación
        if: success()
        run: tar -czf /tmp/legacy-inventory.tar.gz .

      - name: Subir artefacto
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: inventory-app-artifact
          path: /tmp/legacy-inventory.tar.gz